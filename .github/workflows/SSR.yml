name: SSR
on:
  push:
    branches:
      - ssr*
    paths:
      - "app/**"
      - "buildSrc/**"
      - "buildSrc"
      - ".github/workflows/SSR.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag"
        required: true
      publish:
        description: "Publish to GitHub Releases? (y/n)"
        required: false
        default: 'n'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App
        uses: actions/checkout@v5
      - name: Checkout Core
        uses: actions/checkout@v5
        with:
          path: sing-box
          repository: Restia-Ashbell/sing-box
      - name: Libcore Status
        run: |
          git ls-files buildScript | xargs cat | sha1sum > libcore_status
          cd sing-box && git ls-files | xargs cat | sha1sum >> ../libcore_status
      - name: LibCore Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            app/libs/libbox.aar
          key: ${{ hashFiles('.github/workflows/*', 'libcore_status') }}-ci
      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-oss-${{ hashFiles('**/*.gradle.kts') }}-ci
      - name: Setup Golang
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Native Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib core
      - name: Gradle Build
        env:
          BUILD_PLUGIN: none
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          export LOCAL_PROPERTIES="${{ secrets.LOCAL_PROPERTIES }}"
          export KEYSTORE_PASS="${{ secrets.KEYSTORE_PASS }}"
          export ALIAS_NAME="${{ secrets.ALIAS_NAME }}"
          export ALIAS_PASS="${{ secrets.ALIAS_PASS }}"
          ./run init action gradle
          ./gradlew app:assembleOssRelease
          APK=$(find app/build/outputs/apk -name '*arm64-v8a*.apk')
          APK=$(dirname $APK)
          echo "APK=$APK" >> $GITHUB_ENV
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: APKs
          path: ${{ env.APK }}
  publish:
    name: Publish Release
    if: github.event.inputs.publish == 'y'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Donwload Artifacts
        uses: actions/download-artifact@v4
        with:
          name: APKs
          path: artifacts
      - name: Release
        run: |
          wget -O ghr.tar.gz https://github.com/tcnksm/ghr/releases/download/v0.13.0/ghr_v0.13.0_linux_amd64.tar.gz
          tar -xvf ghr.tar.gz
          mv ghr*linux_amd64/ghr .
          mkdir apks
          find artifacts -name "*.apk" -exec cp {} apks \;
          ./ghr -delete -t "${{ github.token }}" -n "${{ github.event.inputs.tag }}" "${{ github.event.inputs.tag }}" apks